services:
  mysql-examen:
    image: mysql:8.0
    container_name: mysql-examen
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: examenad
    ports:
      - "3306:3306"
    volumes:
      - mysql-examen-data:/var/lib/mysql
      - ./Script.sql:/docker-entrypoint-initdb.d/Script.sql:ro
    networks:
      - examen-red

  server1:
    build: .
    container_name: server1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-examen:3306/examenad
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      - mysql-examen
    networks:
      - examen-red

  server2:
    build: .
    container_name: server2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-examen:3306/examenad
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      SERVER_PORT: 8080
    ports:
      - "8082:8080"
    depends_on:
      - mysql-examen
    networks:
      - examen-red

  balanceador:
    image: nginx:alpine
    container_name: balanceador
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server1
      - server2
    networks:
      - examen-red

volumes:
  mysql-examen-data:

networks:
  examen-red:
